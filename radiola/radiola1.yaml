  # --- BUTTONS ---
  # Latching buttons — action on press only, release is ignored (mechanical release button pops them)
  - platform: gpio
    pin:
      number: GPIO23
      mode: INPUT_PULLUP
      inverted: false
    name: "Radiola Button 1"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press:
      - lambda: |-
          id(radio_mode) = true;
          id(lp_mode) = false;
          id(last_dial_mode) = "unknown";
          ESP_LOGI("radiola", "RADIO MODE: ENABLED");
      - dfplayer.play_folder:
          folder: 1
          file: 3

  - platform: gpio
    pin:
      number: GPIO12
      mode: INPUT_PULLUP
      inverted: false
    name: "Radiola Button 2"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press:
      - lambda: |-
          id(lp_mode) = true;
          id(radio_mode) = false;
          ESP_LOGI("radiola", "LP MODE ENABLED");
      - dfplayer.play_folder:
          folder: 1
          file: 3

  - platform: gpio
    pin:
      number: GPIO18
      mode: INPUT_PULLUP
      inverted: false
    name: "Radiola Button 3"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press:
      # In calibration mode this button captures the limits; otherwise normal
      - if:
          condition:
            lambda: 'return id(cal_stage) != 0;'
          then:
            - lambda: |-
                if (id(cal_stage) == 1) {
                  id(dial_min) = id(dial_pos);
                  id(cal_stage) = 2;
                  ESP_LOGI("dial", "CAL: left limit saved (%.0f). Turn dial to RIGHT stop, press Button 3", id(dial_min));
                } else {
                  float a = id(dial_min);
                  float b = id(dial_pos);
                  id(dial_min) = std::min(a, b);
                  id(dial_max) = std::max(a, b);
                  id(cal_stage) = 0;
                  id(dial_needs_cal) = false;
                  global_preferences->sync();
                  ESP_LOGI("dial", "CAL: done. Limits [%.0f, %.0f] saved to flash", id(dial_min), id(dial_max));
                }
            - light.turn_on: radiola_led_1
            - light.turn_on: radiola_led_5
          else:
            # Radio mode: seek to next station; otherwise the old test sound
            - if:
                condition:
                  lambda: 'return id(radio_mode) && !id(dial_needs_cal) && !id(standby_mode);'
                then:
                  - script.execute: dial_seek
                else:
                  - dfplayer.play_folder:
                      folder: 1
                      file: 3

  - platform: gpio
    pin:
      number: GPIO19
      mode: INPUT_PULLUP
      inverted: false
    name: "Radiola Button 4"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press:
      # 5 presses within 3s enters limit calibration; single press = normal
      - lambda: |-
          uint32_t now = millis();
          if (now - id(cal_last_press) > 3000) id(cal_presses) = 0;
          id(cal_last_press) = now;
          id(cal_presses) += 1;
          if (id(cal_presses) >= 5) {
            id(cal_presses) = 0;
            id(cal_stage) = 1;
            id(dial_motor_enable).turn_off();  // free the knob for hand positioning
            ESP_LOGI("dial", "CAL: started. Turn dial to LEFT stop, press Button 3");
          }
      - if:
          condition:
            lambda: 'return id(cal_stage) == 0;'
          then:
            - dfplayer.play_folder:
                folder: 1
                file: 3

  # --- STANDBY CONTACT PLATE ---
  # Plate resting on GND = pin LOW = active/on
  # Plate dialed away from GND = pin HIGH (pullup) = standby
  - platform: gpio
    pin:
      number: GPIO4
      mode: INPUT_PULLUP
      inverted: false
    name: "Radiola Standby Button"
    id: standby_button
    filters:
      - delayed_on: 100ms
      - delayed_off: 100ms
    on_state:
      # Ignore the initial publication at boot (mode already set in on_boot)
      # and any repeat publications that don't change the mode
      - if:
          condition:
            lambda: 'return x == id(standby_mode);'
          then:
            - logger.log: "Standby state unchanged — ignoring"
      - if:
          condition:
            lambda: 'return x != id(standby_mode) && x;'  # plate away from GND = standby ON
          then:
            - lambda: |-
                id(standby_mode) = true;
                id(radio_mode) = false;
                id(lp_mode) = false;
                id(last_dial_mode) = "unknown";
                ESP_LOGI("radiola", "STANDBY MODE: ON");
            # Play shutdown sound first (replaces any current playback)
            - dfplayer.set_volume: 25
            - dfplayer.play_folder:
                folder: 1
                file: 4  # 004.wav shutdown sound
            # --- LED shutdown sequence (reverse order) ---
            - light.turn_off: radiola_led_5
            - delay: 300ms
            - light.turn_off: radiola_led_4
            - delay: 300ms
            - light.turn_off: radiola_led_3
            - delay: 300ms
            - light.turn_off: radiola_led_2
            - delay: 300ms
            - light.turn_off: radiola_led_1
            - homeassistant.service:
                service: media_player.media_stop
                data:
                  entity_id: media_player.kitchen
            # Park the pointer while the shutdown sound plays
            - script.execute: dial_park
            - delay: 2500ms  # allow shutdown sound to finish before cutting power
            - wait_until:
                condition:
                  lambda: 'return id(dial_motor).has_reached_target();'
                timeout: 10s
            - switch.turn_off: dial_motor_enable
            - switch.turn_off: radiola_power
            - lambda: 'global_preferences->sync();  // flush dial position to flash'
            - logger.log: "Entering standby — LEDs off, power rail off, audio stopped"
      - if:
          condition:
            lambda: 'return x != id(standby_mode) && !x;'  # plate on GND = wake
          then:
            - lambda: |-
                id(standby_mode) = false;
                ESP_LOGI("radiola", "STANDBY MODE: OFF");
            - switch.turn_on: radiola_power
            - delay: 500ms  # allow power rail to stabilise before playing
            - dfplayer.set_volume: 25
            - dfplayer.play_folder:
                folder: 1
                file: 2
            # --- LED wake sequence ---
            - light.turn_on: radiola_led_1
            - delay: 300ms
            - light.turn_on: radiola_led_2
            - delay: 300ms
            - light.turn_on: radiola_led_3
            - delay: 300ms
            - light.turn_on: radiola_led_4
            - delay: 300ms
            - light.turn_on: radiola_led_5
            - delay: 400ms
            # --- Blink all once ---
            - light.turn_off: radiola_led_1
            - light.turn_off: radiola_led_2
            - light.turn_off: radiola_led_3
            - light.turn_off: radiola_led_4
            - light.turn_off: radiola_led_5
            - delay: 400ms
            - light.turn_on: radiola_led_1
            - light.turn_on: radiola_led_2
            - light.turn_on: radiola_led_3
            - light.turn_on: radiola_led_4
            - light.turn_on: radiola_led_5
            - homeassistant.service:
                service: media_player.media_play
                data:
                  entity_id: media_player.kitchen
            - logger.log: "Waking from standby — power rail on, LEDs on, audio resumed"
