      - name: "smhi_h3_condition"
        unique_id: smhi_direct_h3_condition
        state: >
          {% set w = states('sensor.smhi_h3_wsymb') | int(0) %}
          {% if w in [1, 2] %}sunny
          {% elif w in [3, 4] %}partly-cloudy
          {% elif w in [5, 6] %}cloudy
          {% elif w == 7 %}fog
          {% elif w in [8, 9, 10, 18, 19, 20] %}rain
          {% elif w in [11, 21] %}thunderstorm
          {% elif w in [12, 13, 14, 22, 23, 24] %}rain
          {% elif w in [15, 16, 17, 25, 26, 27] %}snow
          {% else %}cloudy{% endif %}

      - name: "smhi_h4_condition"
        unique_id: smhi_direct_h4_condition
        state: >
          {% set w = states('sensor.smhi_h4_wsymb') | int(0) %}
          {% if w in [1, 2] %}sunny
          {% elif w in [3, 4] %}partly-cloudy
          {% elif w in [5, 6] %}cloudy
