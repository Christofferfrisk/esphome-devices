esphome:
  name: firebeetle-display
  on_boot:
    priority: 600
    then:
      - lambda: 'id(just_woke) = true;'
      # --- 90s safe window so HA/OTA can connect ---
      - logger.log: "Boot: staying awake 90s for HA/OTA window."
      - deep_sleep.prevent: deep_sleep_ctrl
      - script.execute: wait_for_data_then_refresh   # draw during the window
      - delay: 90s

      # After the window, decide mode based on HA button + quiet hours
      - if:
          condition:
            lambda: 'return id(stay_awake_flag).has_state() && id(stay_awake_flag).state;'
          then:
            - logger.log: "Stay-awake ON — keep running (no deep sleep)."
            - deep_sleep.prevent: deep_sleep_ctrl
          else:
            - logger.log: "Stay-awake OFF — normal cycle (sleep scheduling)."
            - deep_sleep.allow: deep_sleep_ctrl
            - script.execute: sleep_until_next_wake

esp32:
  board: firebeetle32
  framework:
    type: arduino
    sdkconfig_options:
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "60"

logger:

api:
ota:
  platform: esphome



wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.31.254
    gateway: 192.168.31.1
    subnet: 255.255.255.0

globals:
  - id: initial_draw_done
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: just_woke
    type: bool
    restore_value: no

deep_sleep:
  id: deep_sleep_ctrl

script:

  # -------------------------------------------------------------
  # One-shot refresh scheduler (batches many HA updates into one)
  # -------------------------------------------------------------
  - id: schedule_refresh
    mode: restart
    then:
      - delay: 5s
      - script.execute: schedule_refresh_full


  # -------------------------------------------------------------
  # Boot / wake data wait
  # -------------------------------------------------------------
  - id: wait_for_data_then_refresh
    mode: restart
    then:
      - logger.log: "Waiting for HA data (timeout 60s)…"
      - wait_until:
          condition:
            lambda: |-
              auto t = id(ha_time).now();
              if (!t.is_valid()) return false;
              bool ready_weather =
                id(smhi_temp).has_state() &&
                id(smhi_h1_time).has_state() &&
                id(smhi_h1_temp).has_state() &&
                id(smhi_h1_condition).has_state();
              bool ready_run   = id(garmin_run_days).has_state()   || id(garmin_ran_today).has_state();
              bool ready_bike  = id(garmin_bike_days).has_state()  || id(garmin_biked_today).has_state();
              return ready_weather && (ready_run || ready_bike);
          timeout: 60s

      - script.execute: schedule_refresh
      - lambda: 'id(just_woke) = false;'



  # -------------------------------------------------------------
  # BWR-safe full refresh (double waveform)
  # -------------------------------------------------------------
  - id: schedule_refresh_full
    mode: restart
    then:
      - component.update: battery_voltage
      - component.update: epd
      - component.update: epd


  # -------------------------------------------------------------
  # Deep-sleep scheduler
  # -------------------------------------------------------------
  - id: sleep_until_next_wake
    mode: restart
    then:
      - wait_until:
          condition:
            lambda: 'return !id(schedule_refresh).is_running() && !id(schedule_refresh_full).is_running();'
          timeout: 60s
      - deep_sleep.enter:
          id: deep_sleep_ctrl
          sleep_duration: !lambda |-
            uint32_t ms = 5UL * 60UL * 1000UL;
            auto t = id(ha_time).now();
            if (t.is_valid()) {
              const int QUIET_START = 23*60 + 45;  // 23:45
              const int QUIET_END   = 8*60 + 30;   // 08:30
              int mins = t.hour * 60 + t.minute;
              int secs = t.second;
              bool in_quiet = (mins >= QUIET_START) || (mins < QUIET_END);
              if (in_quiet) {
                int remaining_s;
                if (mins < QUIET_END) {
                  remaining_s = (QUIET_END * 60) - (mins * 60 + secs);
                } else {
                  // 23:45–23:59: sleep through midnight to QUIET_END
                  remaining_s = (24 * 60 * 60 - (mins * 60 + secs)) + (QUIET_END * 60);
                }
                if (remaining_s <= 0) remaining_s = 60;
                ms = (uint32_t)remaining_s * 1000UL;
              } else {
                int next_half = (t.minute < 30) ? 30 : 60;
                int remaining_s = (next_half*60) - (t.minute*60 + t.second);
                if (remaining_s <= 0) remaining_s = 30*60;
                ms = (uint32_t)remaining_s * 1000UL;
              }
            }
            ESP_LOGI("sleep", "Deep sleeping for %u ms", (unsigned)ms);
            return ms;


